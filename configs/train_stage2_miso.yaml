# Stage 2: self-refine / structured behavior (continue LoRA from stage 1)
model_name: microsoft/Phi-4-mini-instruct
max_seq_length: 2048
load_in_4bit: true
dtype: null

lora:
  r: 32
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  # Small Miso sets (~100 rows): ~5–15 steps/epoch; 120 steps ≈ many passes — increase if you have 1k+ rows.
  warmup_steps: 15
  max_steps: 120
  learning_rate: 0.0001
  logging_steps: 10
  save_steps: 40
  optim: adamw_8bit
  weight_decay: 0.01
  lr_scheduler_type: cosine
  seed: 3408
  fp16: false
  bf16: true
  report_to: none
