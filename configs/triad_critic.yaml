# Adapter 3 — Critic: critique + improve (do NOT train generic Q&A without critique structure).
# Data: data/critic_sft.jsonl (teacher JSON targets from convert_to_sft on miso_raw)
model_name: microsoft/Phi-4-mini-instruct
max_seq_length: 2048
load_in_4bit: true
dtype: null

lora:
  r: 32
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_steps: 20
  max_steps: 200
  learning_rate: 0.0001
  logging_steps: 10
  save_steps: 50
  optim: adamw_8bit
  weight_decay: 0.01
  lr_scheduler_type: cosine
  seed: 4103
  fp16: false
  bf16: true
  report_to: none
